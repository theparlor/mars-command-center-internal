# =============================================================================
# ASSET REGISTRY — Canonical source tracking and format versioning
# Subaru M.A.R.S. Engagement
# =============================================================================
#
# PURPOSE:
#   Track every deliverable asset, its markdown canonical source, and the
#   version status of each generated format. Enables:
#   - "What formats are stale?" queries
#   - Automated regeneration triggers
#   - Content lineage tracing (which markdown produced which output)
#
# ARCHITECTURE:
#   markdown (canonical) → [html, pdf, pptx, docx] (generated outputs)
#
#   When the markdown changes, its version bumps. All generated formats
#   record which markdown version they were built from. If format_version
#   < source_version, the format is STALE and needs regeneration.
#
# REGENERATION RULES:
#   1. User requests a specific format update → deliver that format first
#   2. After delivery, kick off background regeneration of other stale formats
#   3. Never block the active request waiting for secondary formats
#   4. Update this registry after each successful generation
#
# PORTABILITY:
#   This registry pattern works for any engagement. Copy the structure,
#   replace the assets, and the pipeline logic is the same.
# =============================================================================

registry_version: "1.0.0"
updated: "2026-03-18"
engagement: "Subaru M.A.R.S."

# -----------------------------------------------------------------------------
# ASSET CATALOG
# -----------------------------------------------------------------------------
# Each asset has:
#   id:             Unique slug (used in filenames and cross-references)
#   name:           Human-readable title
#   category:       Grouping for navigation (schedule, org, curriculum, etc.)
#   source:         Path to canonical markdown file (relative to deliverables/)
#   source_version: Current version of the markdown source
#   formats:        Map of output format → generation metadata
#     path:         Output file path (relative to deliverables/)
#     built_from:   Source version this format was generated from
#     updated:      Date of last generation
#     status:       CURRENT (matches source) | STALE (behind source) | MISSING
#   archetype:      Page template type (hub, detail, dashboard, email)
#   notes:          Any special generation considerations
# -----------------------------------------------------------------------------

