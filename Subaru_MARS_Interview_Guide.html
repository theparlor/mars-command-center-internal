<style>

  font-size: 14px;
  font-weight: 700;

  min-height: 50px;
  border: 1px solid #DDD;

  padding: 8px 10px;
  font-size: 14px;
  font-family: inherit;
  resize: vertical;

.bottom-actions {
  padding: 16px;
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}
.action-btn {
  padding: 12px 24px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-export { background: var(--navy); color: white; }
.btn-clear { background: #EEE; color: var(--text); }
.btn-export:active, .btn-clear:active { transform: scale(0.97); }
@media (max-width: 600px) {
  .opt-btn { width: 100%; text-align: left; }
}
@media print {
  .top-bar, .team-selector, .category-nav, .bottom-actions { display: none; }
  .question-card { break-inside: avoid; page-break-inside: avoid; border: 1px solid #CCC; }
  .cat-header { position: static; }
}
</style>

const CATEGORIES = [{"name": "Intake & Prioritization", "questions": [{"category": "Intake & Prioritization", "id": "intake_source", "question": "Where does new work come from?", "options": ["Single product owner / PO", "Multiple stakeholders directly", "Project manager / PMO", "Manager filters and assigns", "Mixed / unclear"], "notes_prompt": "Who are the specific requestors? How many intake channels?", "why": "Single funnel vs. multi-channel intake reveals prioritization bottlenecks"}, {"category": "Intake & Prioritization", "id": "intake_mechanism", "question": "How is new work submitted?", "options": ["Jira ticket (standard form/template)", "Email / Slack request \u2192 someone creates ticket", "Verbal request in meetings", "Formal intake form / portal", "Mixed / ad hoc"], "notes_prompt": "Is there a standard intake template? Who triages?", "why": "Formal intake = traceable demand; verbal = invisible demand and lost context"}, {"category": "Intake & Prioritization", "id": "prioritization_method", "question": "How is work prioritized?", "options": ["PO owns priority stack-rank", "Manager decides", "Loudest voice / executive override", "Committee / steering group", "WSJF / RICE / formal scoring", "First-in-first-out / no clear method"], "notes_prompt": "How often does priority change mid-sprint? What triggers re-priority?", "why": "Priority method determines whether teams are outcome-driven or request-driven"}, {"category": "Intake & Prioritization", "id": "priority_visibility", "question": "Can the team see the prioritized backlog?", "options": ["Yes \u2014 single visible stack-ranked backlog", "Partially \u2014 some work visible, some assigned directly", "No \u2014 work is assigned, team doesn't see full picture"], "notes_prompt": "Where does the team look to see what's next? Jira board? Spreadsheet?", "why": "Invisible priority = reactive team; visible priority = self-organizing potential"}, {"category": "Intake & Prioritization", "id": "unplanned_work", "question": "How is unplanned / urgent work handled?", "options": ["Dedicated capacity buffer (% reserved)", "Interrupts current sprint / pulls people off", "Queued for next sprint unless P1", "Separate on-call / support rotation", "No distinction \u2014 all work is 'urgent'"], "notes_prompt": "What % of work is unplanned? How often do P1s disrupt?", "why": "Unplanned work ratio is a leading indicator of planning maturity"}]}, {"name": "Events & Cadence", "questions": [{"category": "Events & Cadence", "id": "sprint_cadence", "question": "What is the sprint / iteration length?", "options": ["1 week", "2 weeks", "3 weeks", "4 weeks", "No fixed sprints (continuous / Kanban)", "Varies / inconsistent"], "notes_prompt": "When did they adopt this cadence? Has it changed?", "why": "Cadence consistency enables predictability; variation signals instability"}, {"category": "Events & Cadence", "id": "standup_format", "question": "How are standups / daily syncs run?", "options": ["Classic 3-question (did/doing/blockers)", "Walk the board (focus on work items)", "Round-robin status update", "Manager-led status meeting", "No regular standup", "Async standup (Slack / Jira)"], "notes_prompt": "Duration? Who facilitates? Does it stay under 15 min? Who attends?", "why": "Format reveals whether focus is on people or flow of work"}, {"category": "Events & Cadence", "id": "refinement_practice", "question": "How is backlog refinement done?", "options": ["Dedicated refinement session (weekly or bi-weekly)", "Part of sprint planning", "Ad hoc as needed", "PO / lead refines alone, team sees in planning", "Not regularly done"], "notes_prompt": "Who participates? How far ahead is backlog refined? Quality of stories entering sprint?", "why": "Refinement quality directly predicts sprint success rate"}, {"category": "Events & Cadence", "id": "sprint_planning", "question": "How does sprint planning work?", "options": ["Team pulls from refined backlog, commits capacity", "PO/manager assigns work to individuals", "Planning meeting but work is pre-decided", "No formal planning \u2014 work flows continuously", "Planning happens but scope changes anyway"], "notes_prompt": "Duration? Does the team set its own commitment? Does capacity get respected?", "why": "Pull vs. push planning is the core indicator of team autonomy"}, {"category": "Events & Cadence", "id": "retro_practice", "question": "How are retrospectives handled?", "options": ["Regular retros with action items tracked", "Regular retros but actions rarely followed up", "Occasional retros (not every sprint)", "Retros stopped \u2014 'nothing changes'", "Never done retros"], "notes_prompt": "Format used? Who facilitates? Are past action items reviewed? Safety level?", "why": "Retro health = improvement velocity; abandoned retros = learned helplessness"}, {"category": "Events & Cadence", "id": "demo_review", "question": "Is there a sprint review / demo?", "options": ["Regular demo to stakeholders with feedback loop", "Internal team demo only", "Demo exists but stakeholders rarely attend", "No demo \u2014 work ships and that's it"], "notes_prompt": "Who attends? Does feedback actually influence next sprint?", "why": "Demo practice reveals stakeholder engagement and feedback loop health"}]}, {"name": "Estimation & Capacity", "questions": [{"category": "Estimation & Capacity", "id": "estimation_method", "question": "How is work estimated?", "options": ["Story points (Fibonacci / modified)", "T-shirt sizes (S/M/L/XL)", "Hours / time-based", "No estimation \u2014 count of items", "No estimation at all", "Mixed methods"], "notes_prompt": "Who estimates? Is it a team activity or individual? Confidence level?", "why": "Estimation method matters less than whether it's collaborative and consistent"}, {"category": "Estimation & Capacity", "id": "capacity_planning", "question": "How is team capacity determined for a sprint?", "options": ["Calculate available hours/points minus PTO/meetings", "Historical velocity used as guide", "Manager decides what fits", "'Fill the sprint' \u2014 take until it feels full", "No capacity planning \u2014 just pull next item"], "notes_prompt": "Do they account for PTO, meetings, support rotation? How accurate are commitments?", "why": "Capacity discipline directly predicts delivery predictability"}, {"category": "Estimation & Capacity", "id": "commitment_accuracy", "question": "How often does the team complete what it committed to?", "options": ["Almost always (>90%)", "Usually (70-90%)", "Sometimes (50-70%)", "Rarely (<50%)", "Don't track / don't commit"], "notes_prompt": "What causes misses? Scope creep, unplanned work, bad estimates, dependencies?", "why": "Completion rate + reasons reveal systemic impediments"}, {"category": "Estimation & Capacity", "id": "wip_management", "question": "How is work-in-progress managed?", "options": ["Explicit WIP limits enforced", "Informal 'don't take too much' guideline", "Individuals work on multiple items freely", "WIP is a known problem but not managed", "Not discussed / not visible"], "notes_prompt": "Average items in progress per person? Do people context-switch heavily?", "why": "WIP is the #1 lever for cycle time; unmanaged WIP = slow everything"}]}, {"name": "Quality & QA", "questions": [{"category": "Quality & QA", "id": "qa_structure", "question": "How is QA organized relative to the team?", "options": ["Embedded QA within the team", "Shared QA pool across teams", "Separate QA team / handoff model", "Developers do their own testing (no dedicated QA)", "Offshore QA team", "Mixed \u2014 some embedded, some shared"], "notes_prompt": "QA-to-dev ratio? When does QA get involved (early vs. after dev complete)?", "why": "QA integration model determines defect detection speed and cost"}, {"category": "Quality & QA", "id": "testing_approach", "question": "What testing practices are in place?", "options": ["Automated unit + integration + E2E tests", "Automated unit tests, manual E2E", "Mostly manual testing", "Manual testing by QA after development", "Ad hoc / minimal testing"], "notes_prompt": "Test automation coverage %? Who writes automated tests? CI/CD integrated?", "why": "Automation maturity gates how fast you can release with confidence"}, {"category": "Quality & QA", "id": "dor", "question": "Is there a Definition of Ready?", "options": ["Yes \u2014 written, enforced, team won't pull without it", "Yes \u2014 written but not consistently enforced", "Informal understanding but nothing written", "No \u2014 work enters sprint in various states"], "notes_prompt": "What's on the DoR checklist? Who enforces it? Biggest gap?", "why": "DoR quality predicts mid-sprint surprises and rework"}, {"category": "Quality & QA", "id": "dod", "question": "Is there a Definition of Done?", "options": ["Yes \u2014 written, includes testing + review + deployment criteria", "Yes \u2014 but incomplete (e.g., 'code complete' without QA)", "Informal \u2014 everyone 'knows' what done means", "No \u2014 'done' means different things to different people"], "notes_prompt": "Does DoD include code review? Testing? Documentation? Deployment?", "why": "Ambiguous 'done' is the root cause of escaped defects and rework"}, {"category": "Quality & QA", "id": "defect_handling", "question": "How are production defects handled?", "options": ["Triaged and prioritized like other work", "Immediately interrupt current work", "Dedicated support rotation handles bugs", "Bugs pile up until someone complains", "Depends on severity \u2014 P1 interrupts, rest queued"], "notes_prompt": "Defect rate trend? Root cause analysis done? Bug backlog size?", "why": "Defect flow reveals quality culture and technical debt pressure"}]}, {"name": "Jira & Tooling", "questions": [{"category": "Jira & Tooling", "id": "jira_project_structure", "question": "How is the Jira project structured?", "options": ["One project per team with own board", "Shared project with team-specific boards/filters", "Multiple projects per team (by product area)", "One giant project for all teams", "Mix of above / unclear ownership", "Outside Jira \u2014 using spreadsheet, email, or other tool", "Hybrid \u2014 some work tracked in Jira, some outside"], "notes_prompt": "Project key(s)? Board type (Scrum/Kanban)? If outside Jira, what tool(s)? Who administers?", "why": "Jira structure either enables or blocks cross-team visibility"}, {"category": "Jira & Tooling", "id": "jira_hierarchy", "question": "How is work broken down in Jira?", "options": ["Epic \u2192 Story \u2192 Subtask (consistent hierarchy)", "Epics and Stories but subtasks vary", "Flat \u2014 mostly Stories/Tasks, few Epics", "Deep \u2014 Initiatives \u2192 Epics \u2192 Stories \u2192 Subtasks", "Inconsistent \u2014 mix of everything", "Outside Jira \u2014 tracked in spreadsheet or other tool", "Hybrid \u2014 high-level in Jira, detail in spreadsheet/other"], "notes_prompt": "Average story size? Do epics have clear scope/timeline? If hybrid, what lives where?", "why": "Consistent hierarchy enables portfolio-level visibility and planning"}, {"category": "Jira & Tooling", "id": "jira_workflow", "question": "What does the Jira workflow look like?", "options": ["Simple: To Do \u2192 In Progress \u2192 Done", "Standard: Backlog \u2192 Ready \u2192 In Dev \u2192 In QA \u2192 Done", "Complex: 6+ statuses with multiple review gates", "Custom per team", "Workflow exists but people don't update status", "Outside Jira \u2014 workflow managed in another tool", "Hybrid \u2014 Jira workflow exists but real status tracked elsewhere"], "notes_prompt": "Specific statuses used? Where do items get stuck? If outside Jira, what does the flow look like?", "why": "Workflow granularity reveals process maturity; stale statuses = unreliable data"}, {"category": "Jira & Tooling", "id": "jira_hygiene", "question": "How well-maintained are Jira tickets?", "options": ["Consistently: descriptions, acceptance criteria, labels, estimates", "Mostly: key fields filled but some gaps", "Minimal: title and assignee only", "Poor: stale tickets, missing info, duplicates", "Not applicable \u2014 not using Jira for this team's work", "Hybrid \u2014 Jira exists but real detail lives in spreadsheet/docs"], "notes_prompt": "Are acceptance criteria standard? If hybrid, where is the source of truth?", "why": "Jira hygiene = data quality = trustworthy metrics and forecasting"}, {"category": "Jira & Tooling", "id": "jira_reporting", "question": "What Jira reports/metrics are used?", "options": ["Velocity + burndown + cycle time actively used", "Burndown chart glanced at sometimes", "Custom dashboards maintained", "No reports \u2014 Jira is just a task list", "Reports exist but no one looks at them", "Not applicable \u2014 reporting from non-Jira sources", "Hybrid \u2014 Jira + spreadsheet reports combined"], "notes_prompt": "Who reviews metrics? If using non-Jira reports, what tools and what do they track?", "why": "Metrics usage indicates whether the team is data-informed or flying blind"}]}, {"name": "Backlog & Work Management", "questions": [{"category": "Backlog & Work Management", "id": "backlog_depth", "question": "How far ahead is the backlog refined?", "options": ["2-3 sprints ahead", "1 sprint ahead", "Just-in-time (refined during planning)", "Deep backlog but most items stale", "No maintained backlog \u2014 work created as needed"], "notes_prompt": "Backlog item count? How many are actionable vs. parking lot?", "why": "Backlog depth reveals planning horizon and product thinking maturity"}, {"category": "Backlog & Work Management", "id": "work_types", "question": "How is work categorized?", "options": ["Clear types: Feature / Bug / Tech Debt / Spike / Support", "Some categorization but inconsistent", "Everything is a 'Story' or 'Task' regardless", "No categorization"], "notes_prompt": "What % is feature vs. bug vs. tech debt vs. support? Is tech debt tracked?", "why": "Work mix visibility lets you see if teams are building vs. firefighting"}, {"category": "Backlog & Work Management", "id": "tech_debt", "question": "How is technical debt managed?", "options": ["Tracked and allocated time each sprint", "Tracked but rarely prioritized", "Known informally but not in backlog", "Not tracked \u2014 addressed only when things break", "Major tech debt problem acknowledged but no plan"], "notes_prompt": "Top tech debt items? Impact on velocity? Last time debt was addressed?", "why": "Tech debt management predicts long-term velocity trajectory"}]}, {"name": "Cross-Team & Dependencies", "questions": [{"category": "Cross-Team & Dependencies", "id": "dependency_discovery", "question": "How are cross-team dependencies identified?", "options": ["Proactive \u2014 identified in planning/refinement", "Cross-team sync (e.g., sync of syncs)", "Reactive \u2014 discovered when blocked", "Manager-to-manager negotiation", "Not managed \u2014 teams work independently"], "notes_prompt": "Most common dependency partner? Avg wait time for dependent work?", "why": "Dependency management is the #1 scaling challenge in multi-team orgs"}, {"category": "Cross-Team & Dependencies", "id": "dependency_frequency", "question": "How often is this team blocked by another team?", "options": ["Rarely (< once per sprint)", "Occasionally (1-2 per sprint)", "Frequently (3+ per sprint)", "Constantly \u2014 most work has dependencies"], "notes_prompt": "Which teams cause blocks most often? What type of work? Avg resolution time?", "why": "Dependency frequency \u00d7 wait time = total organizational drag"}, {"category": "Cross-Team & Dependencies", "id": "shared_services", "question": "How are shared resources / services accessed?", "options": ["Self-service (APIs, shared components, docs)", "Request-based with SLA", "Request-based without SLA (best effort)", "Must involve specific person (single point of failure)", "N/A \u2014 team is self-contained"], "notes_prompt": "What shared services? DevOps, design, data, infrastructure?", "why": "Shared service model determines t  \u2014 ahead of dev or concurrent? Design system in use?", "why": "Design integration reveals whether user experience is a first-class concern or an afterthought"}, {"category": "Team Roles & Accountability", "id": "role_other_leads", "question": "Are there other leadership or lead roles on the team?", "options": ["QA Lead", "DevOps / Release Lead", "Data / Analytics Lead", "Project Manager / Delivery Lead", "Multiple additional leads", "No other formal lead roles"], "notes_prompt": "Name each role and person. Dedicated or shared? How do they coordinate with Scrum Lead?", "why": "Lead role density reveals organizational complexity and potential decision bottlenecks"}, {"category": "Team Roles & Accountability", "id": "role_business_partners", "question": "Who are the business partners that feed, prioritize, and assess the team's work?", "options": ["Dedicated business partner embedded with team", "Business stakeholders engage through PO", "Business stakeholders go directly to team members", "Manager is the primary business interface", "Multiple business groups with competing priorities", "Unclear or fragmented \u2014 no consistent pattern"], "notes_prompt": "Name key business partners. How do they submit work? How do they assess delivery quality? How often do they engage?", "why": "The business-to-team interface determines whether the team builds the right thing or just the next thing"}]}, {"name": "Team Health & Culture", "questions": [{"category": "Team Health & Culture", "id": "team_stability", "question": "How stable is the team composition?", "options": ["Stable \u2014 same core team 6+ months", "Mostly stable with occasional rotation", "Frequent contractor turnover", "Significant changes in last 3 months", "New team / recently reorganized"], "notes_prompt": "Recent departures/additions? Impact of turnover? Knowledge loss?", "why": "Team stability is prerequisite for high performance"}, {"category": "Team Health & Culture", "id": "contractor_integration", "question": "How well are contractors integrated into the team?", "options": ["Fully integrated \u2014 treated as team members", "Integrated for work but excluded from decisions", "Separate track \u2014 managed differently", "Offshore with timezone/communication gap", "N/A \u2014 no contractors on team"], "notes_prompt": "Contractor % of team? Access to same tools/info? Onboarding quality?", "why": "Contractor integration directly affects velocity and quality in contractor-heavy teams"}, {"category": "Team Health & Culture", "id": "improvement_culture", "question": "Does the team actively improve its own process?", "options": ["Yes \u2014 experiments, measures, adapts regularly", "Tries to improve but changes don't stick", "Waits for management to mandate changes", "Resistant to change / 'this is how we do it'", "Too busy fighting fires to improve"], "notes_prompt": "Last process change they made on their own? Biggest frustration?", "why": "Self-improvement capability is the meta-skill that drives all other improvements"}, {"category": "Team Health & Culture", "id": "pain_points", "question": "What is the team's #1 pain point?", "options": ["Too much unplanned / interrupt work", "Dependencies and waiting on other teams", "Unclear requirements / shifting priorities", "Not enough people / overloaded", "Technical debt / legacy system constraints", "Process overhead / too many meetings", "Lack of clear direction / strategy"], "notes_prompt": "In their words, what would they fix first? What do they wish leadership understood?", "why": "Self-reported pain is the most honest signal and the best starting point for change"}]}];

let currentTeam = 0;
let data = {};

// Initialize data structure
TEAMS.forEach(t => {
  data[t.id] = { answers: {}, notes: {}, observations: {} };
});

// Try loading saved data
try {
  const saved = localStorage.getItem('subaru_assessment');
  if (saved) data = JSON.parse(saved);
} catch(e) {}

function save() {
  try { localStorage.setItem('subaru_assessment', JSON.stringify(data)); } catch(e) {}
}

function renderTeamSelector() {
  const el = document.getElementById('teamSelector');
  el.innerHTML = TEAMS.map((t, i) => {
    const answered = Object.keys(data[t.id]?.answers || {}).length;
    const label = t.name.length > 18 ? t.name.substring(0,16) + '...' : t.name;
    return `<button class="team-btn ${i === currentTeam ? 'active' : ''}" onclick="selectTeam(${i})">${label} (${answered})</button>`;
  }).join('');
}

function renderTeamInfo() {
  const t = TEAMS[currentTeam];
  document.getElementById('teamInfo').innerHTML = `
    <div><span class="name">${t.name}</span></div>
    <div class="meta">Manager: ${t.manager} &nbsp;|&nbsp; HC: ${t.headcount}</div>
  `;
}

function renderCategoryNav() {
  const tid = TEAMS[currentTeam].id;
  const el = document.getElementById('categoryNav');
  el.innerHTML = CATEGORIES.map((cat, i) => {
    const answered = cat.questions.filter(q => data[tid]?.answers?.[q.id]).length;
    const badge = answered > 0 ? `<span class="badge">${answered}</span>` : '';
    return `<button class="cat-btn" onclick="scrollToCat(${i})" id="catBtn${i}">${cat.name}${badge}</button>`;
  }).join('');
}

function renderContent() {
  const tid = TEAMS[currentTeam].id;
  const teamData = data[tid] || { answers: {}, notes: {}, observations: {} };
  let html = '';
  let qNum = 0;

  CATEGORIES.forEach((cat, ci) => {
    html += `<div class="category-section" id="cat${ci}">`;
    html += `<div class="cat-header">${cat.name}</div>`;
    cat.questions.forEach(q => {
      qNum++;
      const selected = teamData.answers[q.id] || '';
      const note = teamData.notes[q.id] || '';
      const isAnswered = selected ? 'answered' : '';
      html += `
        <div class="question-card ${isAnswered}" id="q${q.id}">
          <div class="q-header">
            <div class="q-num">${qNum}</div>
            <div class="q-text">${q.question}</div>
          </div>
          <div class="q-why">${q.why}</div>
          <div class="options">
            ${q.options.map(opt => `
              <button class="opt-btn ${selected === opt ? 'selected' : ''}"
                onclick="selectAnswer('${q.id}', this, '${opt.replace(/'/g, "\\'")}')">${opt}</button>
            `).join('')}
          </div>
          <div class="notes-section">
            <div class="notes-prompt">Dig into: ${q.notes_prompt}</div>
            <textarea class="notes-area" placeholder="Notes..."
              oninput="saveNote('${q.id}', this.value)">${note}</textarea>
          </div>
        </div>`;
    });
    html += '</div>';
  });

  // Observations section
  const obsItems = [
    'Top 3 strengths observed',
    'Top 3 improvement opportunities',
    'Unique practices worth sharing',
    'Biggest risk or concern',
    'Team self-assessment (1-5)',
    'Interviewer assessment (1-5)'
  ];
  html += '<div class="observations-section"><div class="obs-header">Overall Observations</div>';
  obsItems.forEach((item, i) => {
    const val = teamData.observations['obs_' + i] || '';
    html += `<div class="obs-item">
      <div class="obs-label">${item}</div>
      <textarea class="obs-area" oninput="saveObs('obs_${i}', this.value)" placeholder="...">${val}</textarea>
    </div>`;
  });
  html += '</div>';

  document.getElementById('content').innerHTML = html;
  updateProgress();
}

function selectTeam(i) {
  currentTeam = i;
  renderTeamSelector();
  renderTeamInfo();
  renderCategoryNav();
  renderContent();
  window.scrollTo(0, 0);
}

function selectAnswer(qid, btn, value) {
  const tid = TEAMS[currentTeam].id;
  if (!data[tid]) data[tid] = { answers: {}, notes: {}, observations: {} };

  // Toggle: if already selected, deselect
  if (data[tid].answers[qid] === value) {
    delete data[tid].answers[qid];
    btn.classList.remove('selected');
  } else {
    data[tid].answers[qid] = value;
    // Update UI
    const card = btn.closest('.question-card');
    card.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    card.classList.add('answered');
  }
  save();
  updateProgress();
  renderTeamSelector();
  renderCategoryNav();
}

function saveNote(qid, value) {
  const tid = TEAMS[currentTeam].id;
  if (!data[tid]) data[tid] = { answers: {}, notes: {}, observations: {} };
  data[tid].notes[qid] = value;
  save();
}

function saveObs(key, value) {
  const tid = TEAMS[currentTeam].id;
  if (!data[tid]) data[tid] = { answers: {}, notes: {}, observations: {} };
  data[tid].observations[key] = value;
  save();
}

function updateProgress() {
  const tid = TEAMS[currentTeam].id;
  const answered = Object.keys(data[tid]?.answers || {}).length;
  const total = CATEGORIES.reduce((sum, c) => sum + c.questions.length, 0);
  document.getElementById('progress').textContent = `${answered} / ${total} answered`;
}

function scrollToCat(i) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('catBtn' + i)?.classList.add('active');
  document.getElementById('cat' + i)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function exportData() {
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'subaru_assessment_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function clearTeam() {
  const tid = TEAMS[currentTeam].id;
  const name = TEAMS[currentTeam].name;
  if (confirm('Clear all answers for ' + name + '? This cannot be undone.')) {
    data[tid] = { answers: {}, notes: {}, observations: {} };
    save();
    renderContent();
    renderTeamSelector();
    renderCategoryNav();
  }
}

// Initial render
selectTeam(0);
</script>
