<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../mars-ui/mars-ui.css">
<title>Subaru M.A.R.S. — Activity Cards</title>
<style>
  .accent-bar { height: 4px; background: var(--subaru-blue); width: 100%; }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; background: var(--surface-dim); color: var(--text-primary); }

  .header { background: linear-gradient(135deg, var(--subaru-blue) 0%, var(--star-cluster) 100%); color: white; padding: 20px 32px; display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.3px; }

  .controls { background: var(--surface); padding: 12px 32px; border-bottom: 2px solid var(--star-cluster); display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .controls select { padding: 4px 10px; border: 1px solid var(--border-soft); border-radius: var(--shape-sm); font-size: 12px; }
  .controls label { font-size: 12px; font-weight: 700; color: var(--subaru-blue); }

  .board { padding: 20px 32px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; min-height: 60vh; }
  .column { background: var(--surface-container); border-radius: var(--shape-md); padding: 12px; min-height: 200px; }

  .col-header { font-size: 14px; font-weight: 800; color: white; padding: 10px 14px; border-radius: var(--shape-sm); margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
  .col-header .count { background: rgba(255, 255, 255, 0.3); padding: 1px 8px; border-radius: 10px; font-size: 12px; }

  .card { background: var(--surface); border-radius: var(--shape-sm); padding: 12px; margin-bottom: 10px; border-left: 4px solid; box-shadow: var(--elevation-1); cursor: pointer; transition: all 0.15s; }
  .card:hover { transform: translateY(-2px); box-shadow: var(--elevation-2); }

  .card-title { font-weight: 700; font-size: 13px; margin-bottom: 4px; }
  .card-meta { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; }
  .card-week { font-size: 10px; background: var(--surface-dim); display: inline-block; padding: 1px 6px; border-radius: 8px; margin-top: 4px; }
  .card-owner { font-size: 10px; color: var(--star-cluster); font-weight: 600; }

  .phase-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; color: white; display: inline-block; margin-bottom: 8px; }

  .footer-bar { height: 3px; background: linear-gradient(90deg, var(--subaru-blue) 0%, var(--star-cluster) 50%, var(--subaru-blue) 100%); margin-top: 24px; }
  .footer { background: var(--surface-container); border-top: 1px solid var(--border-soft); color: var(--text-secondary); padding: 12px 32px; font-size: 11px; display: flex; justify-content: space-between; margin-top: 24px; }

  @media (max-width: 900px) {
    .board { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="accent-bar"></div>

<div class="header">
  <div>
    <h1>Subaru M.A.R.S. — Activity Cards</h1>
    <div style="font-size:12px;opacity:.8">Engagement Activities by Workstream · 5 Lanes · 20 Weeks</div>
  </div>
  <div style="text-align:right;font-size:11px;opacity:.7">
    Updated Mar 13, 2026<br>CONFIDENTIAL
  </div>
</div>

<div class="controls">
  <label>Week Range:</label>
  <select id="weekFrom" onchange="renderBoard()"></select>
  <span style="font-size:12px">to</span>
  <select id="weekTo" onchange="renderBoard()"></select>
  <label style="margin-left:12px">Owner:</label>
  <select id="ownerFilter" onchange="renderBoard()">
    <option value="all">All</option>
    <option value="Dean">Dean</option>
    <option value="Brien">Brien</option>
    <option value="Omar">Omar</option>
    <option value="Louise">Louise</option>
    <option value="Jason">Jason</option>
    <option value="Team">Team</option>
  </select>
</div>

<div class="board" id="board"></div>

<div class="footer-bar"></div>
<div class="footer">
  <span>Subaru of America — M.A.R.S. Agile Transformation · Prepared by Turnberry Solutions</span>
  <span>Source: Reconciled Schedule · Mar 13, 2026</span>
</div>

<script>
const LANES = [
  {key:'training',label:'Training & Curriculum',color:'#1976D2'},
  {key:'coaching',label:'Coaching',color:'#7B1FA2'},
  {key:'jira',label:'JIRA & Metrics',color:'#00897B'},
  {key:'ocm',label:'OCM & Comms',color:'#EF6C00'},
  {key:'planning',label:'Planning & Status',color:'#C62828'}
];

const CARDS = [
  {l:'Agile Mindset + Scrum',lane:'training',wk:1,o:'Dean',phase:'Foundational'},
  {l:'Estimation (Story Pointing & Capacity)',lane:'training',wk:5,o:'Dean',phase:'Applied'},
  {l:'User Story Writing',lane:'training',wk:7,o:'Dean',phase:'Applied'},
  {l:'User Stories & Backlog Fundamentals',lane:'training',wk:7,o:'Dean',phase:'Applied'},
  {l:'Planning for Adaptability',lane:'training',wk:9,o:'Dean',phase:'Applied'},
  {l:'Story Splitting',lane:'training',wk:9,o:'Dean',phase:'Applied'},
  {l:'Flow / WIP',lane:'training',wk:11,o:'Dean',phase:'Applied'},
  {l:'Product Mindset',lane:'training',wk:11,o:'Dean',phase:'Applied'},
  {l:'Navigating Change',lane:'training',wk:13,o:'Dean',phase:'Applied'},
  {l:'On-Demand / Triggered',lane:'training',wk:15,o:'Team',phase:'On-Demand'},

  {l:'Coaching Prep',lane:'coaching',wk:0,o:'Dean / Brien',phase:'Prep'},
  {l:'Begin Coaching',lane:'coaching',wk:2,o:'Dean / Brien',phase:'Kickoff'},
  {l:'Embedded Coaching',lane:'coaching',wk:3,o:'Dean / Brien',phase:'Foundation'},
  {l:'Pre-Plan Prep',lane:'coaching',wk:5,o:'Dean / Brien',phase:'Foundation'},
  {l:'Sprint Execution',lane:'coaching',wk:7,o:'Dean / Brien',phase:'Execution'},
  {l:'WIP / Flow Coaching',lane:'coaching',wk:9,o:'Dean / Brien',phase:'Flow'},
  {l:'Deepen',lane:'coaching',wk:10,o:'Dean / Brien',phase:'Deepening'},
  {l:'PI Readiness',lane:'coaching',wk:12,o:'Dean / Brien',phase:'Planning'},
  {l:'Self-Sufficiency',lane:'coaching',wk:14,o:'Dean / Brien',phase:'Independence'},
  {l:'Maturity',lane:'coaching',wk:17,o:'Dean / Brien',phase:'Maturity'},
  {l:'Sustain & Wrap',lane:'coaching',wk:19,o:'Dean / Brien',phase:'Close'},
  {l:'Platform Leader 1:1s',lane:'coaching',wk:3,o:'Dean / Brien',phase:'Ongoing'},
  {l:'Office Hours',lane:'coaching',wk:2,o:'Dean / Brien',phase:'Ongoing'},

  {l:'Environment Assessment',lane:'jira',wk:1,o:'Omar',phase:'Discovery'},
  {l:'Initial Onboard',lane:'jira',wk:2,o:'Omar',phase:'Discovery'},
  {l:'Deep Dives',lane:'jira',wk:3,o:'Omar',phase:'Discovery'},
  {l:'Findings Report',lane:'jira',wk:4,o:'Omar',phase:'Analysis'},
  {l:'Job Aides',lane:'jira',wk:5,o:'Omar',phase:'Build'},
  {l:'Dashboards',lane:'jira',wk:6,o:'Omar',phase:'Build'},
  {l:'Draft Future State',lane:'jira',wk:7,o:'Omar',phase:'Design'},
  {l:'Configuration',lane:'jira',wk:8,o:'Omar',phase:'Build'},
  {l:'Migration',lane:'jira',wk:12,o:'Omar',phase:'Execute'},
  {l:'Baseline Velocity',lane:'jira',wk:7,o:'Team',phase:'Metrics'},
  {l:'Scorecards v1',lane:'jira',wk:9,o:'Team',phase:'Metrics'},
  {l:'Metrics Dashboards',lane:'jira',wk:10,o:'Team',phase:'Metrics'},
  {l:'Baseline vs. Current',lane:'jira',wk:13,o:'Team',phase:'Metrics'},
  {l:'Metrics Playbook',lane:'jira',wk:14,o:'Team',phase:'Sustainability'},
  {l:'Final Handoff',lane:'jira',wk:20,o:'Team',phase:'Close'},

  {l:'Surveys Out',lane:'ocm',wk:0,o:'Louise',phase:'Baseline'},
  {l:'Baseline Results',lane:'ocm',wk:2,o:'Louise',phase:'Baseline'},
  {l:'Manager Meetings',lane:'ocm',wk:2,o:'Louise',phase:'Kickoff'},
  {l:'JIRA Comms',lane:'ocm',wk:3,o:'Louise',phase:'Comms'},
  {l:'Plans Comms',lane:'ocm',wk:4,o:'Louise',phase:'Comms'},
  {l:'Ongoing OCM',lane:'ocm',wk:5,o:'Louise',phase:'Ongoing'},
  {l:'Pulse #2',lane:'ocm',wk:9,o:'Louise',phase:'Assessment'},
  {l:'Final Pulse',lane:'ocm',wk:19,o:'Louise',phase:'Close'},

  {l:'Pre-Planning (PI #0)',lane:'planning',wk:6,o:'Jason / Dean',phase:'Planning'},
  {l:'PI Planning #1',lane:'planning',wk:13,o:'Jason / Dean',phase:'Planning'},
  {l:'PI Planning #2 / Close',lane:'planning',wk:20,o:'Jason / Dean',phase:'Planning'},
  {l:'Status Update → Greg',lane:'planning',wk:2,o:'Jason',phase:'Status'},
  {l:'Status Update → Greg',lane:'planning',wk:4,o:'Jason',phase:'Status'},
  {l:'Status Update → Greg',lane:'planning',wk:6,o:'Jason',phase:'Status'},
  {l:'Status Update → Greg',lane:'planning',wk:8,o:'Jason',phase:'Status'},
  {l:'Status Update → Greg',lane:'planning',wk:10,o:'Jason',phase:'Status'},
  {l:'Status Update → Greg',lane:'planning',wk:12,o:'Jason',phase:'Status'},
  {l:'Status Update → Greg',lane:'planning',wk:14,o:'Jason',phase:'Status'},
  {l:'Status Update → Greg',lane:'planning',wk:18,o:'Jason',phase:'Status'},
];

// Populate week selectors
const fromSel = document.getElementById('weekFrom');
const toSel = document.getElementById('weekTo');
for (let w=0; w<=20; w++) {
  fromSel.innerHTML += `<option value="${w}"${w===0?' selected':''}>Wk ${w}</option>`;
  toSel.innerHTML += `<option value="${w}"${w===20?' selected':''}>Wk ${w}</option>`;
}

function currentWeek() {
  const START = new Date(2026, 1, 23);
  return Math.floor((new Date() - START) / (7*24*60*60*1000));
}

function renderBoard() {
  const wFrom = parseInt(fromSel.value);
  const wTo = parseInt(toSel.value);
  const oFilter = document.getElementById('ownerFilter').value;
  const cw = currentWeek();
  const board = document.getElementById('board');
  board.innerHTML = '';

  LANES.forEach(lane => {
    const col = document.createElement('div');
    col.className = 'column';

    let filtered = CARDS.filter(c => c.lane === lane.key && c.wk >= wFrom && c.wk <= wTo);
    if (oFilter !== 'all') filtered = filtered.filter(c => c.o.includes(oFilter));

    col.innerHTML = `<div class="col-header" style="background:${lane.color}">
      ${lane.label}
      <span class="count">${filtered.length}</span>
    </div>`;

    filtered.forEach(c => {
      const isPast = c.wk < cw;
      const isCurrent = c.wk === cw;
      col.innerHTML += `<div class="card" style="border-color:${lane.color};${isPast?'opacity:.5':''}${isCurrent?'border-left-width:6px':''}">
        <div class="phase-badge" style="background:${lane.color}">${c.phase}</div>
        <div class="card-title">${c.l}</div>
        <div class="card-owner">${c.o}</div>
        <div class="card-week">Wk ${c.wk}</div>
      </div>`;
    });

    board.appendChild(col);
  });
}

renderBoard();
</script>
<script src="../mars-ui/mars-shell.js"></script>
</body>
</html>
