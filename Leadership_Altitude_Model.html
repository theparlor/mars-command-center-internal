  :root {

    --product: #0f3460;
    --product-light: #164a80;
    --operational: #1a5276;
    --operational-light: #2471a3;
    --team: #1e8449;
    --team-light: #27ae60;
    --enterprise: #e74c3c;
    --enablement: #3498db;
    --both: #9b59b6;
    --stat-bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border-soft: #30363d;
    --text-primary: #e6edf3;
    --text-muted: #8b949e;

  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--stat-bg); color: var(--text-primary); }

  .app { max-width: 1600px; margin: 0 auto; padding: 24px; }

  .header { text-align: center; margin-bottom: 32px; }
  .header h1 { font-size: 28px; font-weight: 600; margin-bottom: 8px; }
  .header p { color: var(--text-muted); font-size: 15px; max-width: 700px; margin: 0 auto; line-height: 1.5; }

  .nav-tabs { display: flex; gap: 4px; background: var(--surface); border-radius: 12px; padding: 4px; margin-bottom: 24px; justify-content: center; }
  .nav-tab { padding: 10px 20px; border-radius: 8px; border: none; background: transparent; color: var(--text-muted); cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s; }
  .nav-tab:hover { color: var(--text-primary); background: var(--surface2); }
  .nav-tab.active { background: var(--accent); color: #fff; }

  /* ALTITUDE STACK VIEW */
  .altitude-stack { display: flex; flex-direction: column; gap: 2px; margin-bottom: 32px; }
  .altitude-row { display: grid; grid-template-columns: 200px 1fr 1fr; gap: 2px; cursor: pointer; transition: all 0.2s; }
  .altitude-row:hover { transform: scale(1.005); }
  .altitude-row.selected { transform: scale(1.01); }

  .altitude-label { padding: 20px 16px; display: flex; flex-direction: column; justify-content: center; border-radius: 8px 0 0 8px; position: relative; }
  .altitude-label h3 { font-size: 16px; font-weight: 600; }
  .altitude-label .subtitle { font-size: 11px; opacity: 0.7; margin-top: 4px; }
  .altitude-label .level { font-size: 10px; opacity: 0.5; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }

  .os-cell { padding: 16px; position: relative; }
  .os-cell.enterprise { background: rgba(231,76,60,0.08); border-top: 2px solid rgba(231,76,60,0.3); }
  .os-cell.enablement { background: rgba(52,152,219,0.08); border-top: 2px solid rgba(52,152,219,0.3); border-radius: 0 8px 8px 0; }
  .os-cell h4 { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }

  .accountability-tag { display: inline-block; padding: 4px 10px; border-radius: 4px; font-size: 12px; margin: 2px 4px 2px 0; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); }
  .accountability-tag.own { border-color: rgba(88,166,255,0.4); background: rgba(88,166,255,0.1); }
  .accountability-tag.decide { border-color: rgba(238,130,238,0.4); background: rgba(238,130,238,0.1); }
  .accountability-tag.communicate { border-color: rgba(46,204,113,0.4); background: rgba(46,204,113,0.1); }
  .accountability-tag.measure { border-color: rgba(241,196,15,0.4); background: rgba(241,196,15,0.1); }
  .accountability-tag.learn { border-color: rgba(230,126,34,0.4); background: rgba(230,126,34,0.1); }

  .os-headers { display: grid; grid-template-columns: 200px 1fr 1fr; gap: 2px; margin-bottom: 8px; }
  .os-header { text-align: center; padding: 8px; font-size: 13px; font-weight: 600; border-radius: 8px; }
  .os-header.enterprise-h { background: rgba(231,76,60,0.15); color: #e74c3c; }
  .os-header.enablement-h { background: rgba(52,152,219,0.15); color: #3498db; }

  /* DETAIL PANEL */
  .detail-panel { background: var(--surface); border: 1px solid var(--border-soft); border-radius: 12px; padding: 24px; margin-top: 16px; }
  .detail-panel h2 { font-size: 20px; margin-bottom: 16px; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .detail-section { background: var(--surface2); border-radius: 8px; padding: 16px; }
  .detail-section h3 { font-size: 14px; color: var(--accent); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  .detail-section ul { list-style: none; }
  .detail-section li { padding: 6px 0; font-size: 14px; line-height: 1.5; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .detail-section li:last-child { border-bottom: none; }

  /* ATOM BUILDER VIEW */
  .atom-container { display: grid; grid-template-columns: 300px 1fr; gap: 24px; }
  .atom-controls { background: var(--surface); border-radius: 12px; padding: 20px; border: 1px solid var(--border-soft); }
  .atom-controls h3 { font-size: 14px; color: var(--accent); margin-bottom: 12px; }
  .control-group { margin-bottom: 20px; }
  .control-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .pill-group { display: flex; flex-wrap: wrap; gap: 4px; }
  .pill { padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border-soft); background: transparent; color: var(--text-muted); cursor: pointer; font-size: 12px; transition: all 0.2s; }
  .pill:hover { border-color: var(--accent); color: var(--text-primary); }
  .pill.selected { background: var(--accent); color: #fff; border-color: var(--accent); }

  .atom-preview { background: var(--surface); border-radius: 12px; padding: 24px; border: 1px solid var(--border-soft); }
  .atom-card { background: var(--surface2); border-radius: 12px; padding: 24px; margin-bottom: 16px; border-left: 4px solid var(--accent); }
  .atom-card .meta-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .meta-badge { padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

  .atom-card .content-block { margin-top: 12px; }
  .atom-card .content-block h4 { font-size: 13px; color: var(--text-muted); margin-bottom: 6px; }
  .atom-card .content-block p { font-size: 14px; line-height: 1.6; }

  /* FLOW DIAGRAM VIEW */
  .flow-container { position: relative; }
  .flow-diagram { display: flex; flex-direction: column; align-items: center; gap: 0; }
  .flow-altitude { width: 100%; display: flex; align-items: center; gap: 16px; padding: 16px 0; position: relative; }
  .flow-altitude::after { content: ''; position: absolute; left: 50%; bottom: 0; width: 2px; height: 16px; background: var(--border-soft); }
  .flow-altitude:last-child::after { display: none; }

  .flow-node { flex: 1; background: var(--surface); border: 1px solid var(--border-soft); border-radius: 12px; padding: 16px; text-align: center; }
  .flow-node h4 { font-size: 14px; margin-bottom: 8px; }
  .flow-node p { font-size: 12px; color: var(--text-muted); }
  .flow-center { width: 140px; text-align: center; flex-shrink: 0; }
  .flow-center .altitude-badge { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; }

  .arrow-down { width: 24px; height: 24px; margin: 0 auto; color: var(--text-muted); text-align: center; font-size: 18px; }

  /* MATRIX VIEW */
  .matrix-table { width: 100%; border-collapse: separate; border-spacing: 2px; }
  .matrix-table th { padding: 10px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; background: var(--surface); border-radius: 6px; text-align: center; }
  .matrix-table th:first-child { text-align: left; }
  .matrix-table td { padding: 10px; font-size: 13px; background: var(--surface); border-radius: 6px; text-align: center; vertical-align: top; }
  .matrix-table td:first-child { text-align: left; font-weight: 600; white-space: nowrap; }
  .matrix-cell { font-size: 12px; line-height: 1.6; text-align: left; }
  .matrix-cell .primary { color: var(--accent); font-weight: 500; }
  .matrix-cell .secondary { color: var(--text-muted); }

  /* SUBARU VIEW */
  .scenario-card { background: var(--surface); border: 1px solid var(--border-soft); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .scenario-card h3 { font-size: 16px; margin-bottom: 8px; }
  .scenario-card .scenario-desc { color: var(--text-muted); font-size: 14px; margin-bottom: 16px; }
  .scenario-atoms { display: flex; flex-wrap: wrap; gap: 8px; }
  .scenario-atom { display: flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 8px; background: var(--surface2); border: 1px solid var(--border-soft); font-size: 12px; }
  .scenario-atom .dim-label { color: var(--text-muted); font-size: 10px; text-transform: uppercase; }
  .scenario-atom .dim-value { font-weight: 600; }

  .legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px; padding: 12px 16px; background: var(--surface); border-radius: 8px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }

  .section-intro { background: var(--surface); border-radius: 12px; padding: 20px; margin-bottom: 24px; border-left: 3px solid var(--accent); }
  .section-intro h2 { font-size: 18px; margin-bottom: 8px; }
  .section-intro p { font-size: 14px; color: var(--text-muted); line-height: 1.6; }
</style>
</head>

    contentGuidance: 'Current state evidence. Gap analysis. Recommended target state. Sequencing options with trade-offs.'
  }
];


function App() {
  const [activeView, setActiveView] = useState('altitudes');
  const [selectedAltitude, setSelectedAltitude] = useState(null);
  const [selectedAccType, setSelectedAccType] = useState(null);

  // Atom builder state
  const [atomAltitude, setAtomAltitude] = useState(null);
  const [atomOS, setAtomOS] = useState(null);
  const [atomType, setAtomType] = useState(null);
  const [atomChannel, setAtomChannel] = useState(null);
  const [atomCadence, setAtomCadence] = useState(null);
  const [atomDomain, setAtomDomain] = useState(null);

  const views = [
    { id: 'altitudes', label: 'Altitude Stack' },
    { id: 'matrix', label: 'Accountability Matrix' },
    { id: 'atoms', label: 'Atom Builder' },
    { id: 'subaru', label: 'Subaru Scenarios' }
  ];

  return (
    <div className="app">
      <div className="header">
        <h1>Leadership Altitude &amp; Communications Model</h1>
        <p>A multi-dimensional framework for mapping leadership accountabilities across the dual operating system. Each "communication atom" carries metadata that composes into any view.</p>
      </div>

      <div className="nav-tabs">
        {views.map(v => (
          <button key={v.id} className={`nav-tab ${activeView === v.id ? 'active' : ''}`}
            onClick={() => setActiveView(v.id)}>{v.label}</button>
        ))}
      </div>

      {activeView === 'altitudes' && (
        <AltitudeStackView
          selectedAltitude={selectedAltitude}
          setSelectedAltitude={setSelectedAltitude}
          selectedAccType={selectedAccType}
          setSelectedAccType={setSelectedAccType}
        />
      )}
      {activeView === 'matrix' && <MatrixView />}
      {activeView === 'atoms' && (
        <AtomBuilderView
          atomAltitude={atomAltitude} setAtomAltitude={setAtomAltitude}
          atomOS={atomOS} setAtomOS={setAtomOS}
          atomType={atomType} setAtomType={setAtomType}
          atomChannel={atomChannel} setAtomChannel={setAtomChannel}
          atomCadence={atomCadence} setAtomCadence={setAtomCadence}
          atomDomain={atomDomain} setAtomDomain={setAtomDomain}
        />
      )}
      {activeView === 'subaru' && <SubaruView />}
    </div>
  );
}

function AltitudeStackView({ selectedAltitude, setSelectedAltitude, selectedAccType, setSelectedAccType }) {
  const selected = ALTITUDES.find(a => a.id === selectedAltitude);

  return (
    <div>
      <div className="section-intro">
        <h2>Five Leadership Altitudes</h2>
        <p>Each altitude operates at a different time horizon and abstraction level. The same domain (e.g., "Training") means different things at each altitude: investment at Executive, architecture at Strategic, delivery at Product, logistics at Operational, learning at Team. Click any layer to explore.</p>
      </div>

      <div className="legend">
        {ACCOUNTABILITY_TYPES.map(t => (
          <button key={t.id} className="legend-item" style={{ cursor: 'pointer', background: 'none', border: 'none', color: selectedAccType === t.id ? '#fff' : 'var(--text-muted)' }}
            onClick={() => setSelectedAccType(selectedAccType === t.id ? null : t.id)}>
            <span className="legend-dot" style={{ background: t.color }}></span>
            {t.label}
          </button>
        ))}
        <button className="legend-item" style={{ cursor: 'pointer', background: 'none', border: 'none', color: 'var(--text-muted)' }}
          onClick={() => setSelectedAccType(null)}>
          <span className="legend-dot" style={{ background: '#555' }}></span>
          Show All
        </button>
      </div>

      <div className="os-headers">
        <div></div>
        <div className="os-header enterprise-h">Enterprise OS — How We Run</div>
        <div className="os-header enablement-h">Enablement OS — How We Grow</div>
      </div>

      <div className="altitude-stack">
        {ALTITUDES.map(alt => (
          <div key={alt.id}
            className={`altitude-row ${selectedAltitude === alt.id ? 'selected' : ''}`}
            onClick={() => setSelectedAltitude(selectedAltitude === alt.id ? null : alt.id)}
          >
            <div className="altitude-label" style={{ background: alt.bgColor, borderLeft: `4px solid ${alt.color}` }}>
              <span className="level">{alt.level} · {alt.timeHorizon}</span>
              <h3 style={{ color: alt.color }}>{alt.name}</h3>
              <span className="subtitle">{alt.subtitle}</span>
            </div>
            <div className="os-cell enterprise">
              {renderAccountabilities(alt.enterprise, selectedAccType)}
            </div>
            <div className="os-cell enablement">
              {renderAccountabilities(alt.enablement, selectedAccType)}
            </div>
          </div>
        ))}
      </div>

      {selected && (
        <div className="detail-panel">
          <h2 style={{ color: selected.color }}>
            {selected.name}
            <span style={{ fontSize: '14px', color: 'var(--text-muted)', marginLeft: '12px', fontWeight: 400 }}>
              Key Question: "{selected.keyQuestion}"
            </span>
          </h2>
          <div className="detail-grid">
            <div className="detail-section">
              <h3 style={{ color: '#e74c3c' }}>Enterprise OS Accountabilities</h3>
              {ACCOUNTABILITY_TYPES.map(t => (
                <div key={t.id} style={{ marginBottom: '12px' }}>
                  <div style={{ fontSize: '12px', color: t.color, fontWeight: 600, marginBottom: '4px' }}>{t.label}</div>
                  <ul>
                    {selected.enterprise[t.id === 'learn' ? 'learns' : t.id === 'own' ? 'owns' : t.id === 'decide' ? 'decides' : t.id === 'communicate' ? 'communicates' : 'measures'].map((item, i) => (
                      <li key={i}>{item}</li>
                    ))}
                  </ul>
                </div>
              ))}
            </div>
            <div className="detail-section">
              <h3 style={{ color: '#3498db' }}>Enablement OS Accountabilities</h3>
              {ACCOUNTABILITY_TYPES.map(t => (
                <div key={t.id} style={{ marginBottom: '12px' }}>
                  <div style={{ fontSize: '12px', color: t.color, fontWeight: 600, marginBottom: '4px' }}>{t.label}</div>
                  <ul>
                    {selected.enablement[t.id === 'learn' ? 'learns' : t.id === 'own' ? 'owns' : t.id === 'decide' ? 'decides' : t.id === 'communicate' ? 'communicates' : 'measures'].map((item, i) => (
                      <li key={i}>{item}</li>
                    ))}
                  </ul>
                </div>
              ))}
            </div>
          </div>
          <div style={{ marginTop: '16px', padding: '12px 16px', background: 'rgba(88,166,255,0.08)', borderRadius: '8px', borderLeft: '3px solid var(--accent)' }}>
            <div style={{ fontSize: '12px', color: 'var(--accent)', fontWeight: 600, marginBottom: '4px' }}>SUBARU MAPPING</div>
            <div style={{ fontSize: '14px' }}><strong>{selected.subaruExample.who}</strong></div>
            <div style={{ fontSize: '13px', color: 'var(--text-muted)' }}>{selected.subaruExample.context}</div>
          </div>
        </div>
      )}
    </div>
  );
}

function renderAccountabilities(os, filterType) {
  const types = filterType
    ? [{ id: filterType, items: os[filterType === 'learn' ? 'learns' : filterType === 'own' ? 'owns' : filterType === 'decide' ? 'decides' : filterType === 'communicate' ? 'communicates' : 'measures'] }]
    : [
      { id: 'own', items: os.owns },
      { id: 'decide', items: os.decides }
    ];

  return (
    <div>
      {types.map(t => (
        t.items.slice(0, filterType ? 3 : 2).map((item, i) => (
          <span key={`${t.id}-${i}`} className={`accountability-tag ${t.id}`}>{item}</span>
        ))
      ))}
    </div>
  );
}

function MatrixView() {
  const channelHeaders = ['Steering', 'Status Report', 'Slack', 'Standup', 'Retro', 'Coaching', 'Dashboard'];

  const matrixData = {
    'executive': { 'Steering': { p: 'Direction, Decision', s: 'Quarterly' }, 'Status Report': { p: 'Receive / Approve', s: 'Bi-weekly' }, 'Slack': { p: '—', s: '' }, 'Standup': { p: '—', s: '' }, 'Retro': { p: '—', s: '' }, 'Coaching': { p: '—', s: '' }, 'Dashboard': { p: 'Portfolio view', s: 'On-demand' } },
    'strategic': { 'Steering': { p: 'Status, Ask', s: 'Quarterly' }, 'Status Report': { p: 'Author / Frame', s: 'Bi-weekly' }, 'Slack': { p: 'Signals, Patterns', s: 'Ad-hoc' }, 'Standup': { p: '—', s: '' }, 'Retro': { p: 'Observe / Coach', s: 'Per-sprint' }, 'Coaching': { p: 'Design / Mentor', s: 'Weekly' }, 'Dashboard': { p: 'Trend analysis', s: 'Weekly' } },
    'product': { 'Steering': { p: '—', s: '' }, 'Status Report': { p: 'Contribute data', s: 'Bi-weekly' }, 'Slack': { p: 'Coordination', s: 'Daily' }, 'Standup': { p: 'Observe', s: 'Daily' }, 'Retro': { p: 'Facilitate', s: 'Per-sprint' }, 'Coaching': { p: 'Deliver / Adapt', s: 'Weekly' }, 'Dashboard': { p: 'Product metrics', s: 'Weekly' } },
    'operational': { 'Steering': { p: '—', s: '' }, 'Status Report': { p: 'Source data', s: 'Bi-weekly' }, 'Slack': { p: 'Execution, Blockers', s: 'Daily' }, 'Standup': { p: 'Facilitate', s: 'Daily' }, 'Retro': { p: 'Participate', s: 'Per-sprint' }, 'Coaching': { p: 'Support / Log', s: 'As-needed' }, 'Dashboard': { p: 'Ops health', s: 'Daily' } },
    'team': { 'Steering': { p: '—', s: '' }, 'Status Report': { p: '—', s: '' }, 'Slack': { p: 'Questions, Learning', s: 'Daily' }, 'Standup': { p: 'Participate', s: 'Daily' }, 'Retro': { p: 'Participate', s: 'Per-sprint' }, 'Coaching': { p: 'Receive / Apply', s: 'Per-session' }, 'Dashboard': { p: 'Team metrics', s: 'Daily' } }
  };

  return (
    <div>
      <div className="section-intro">
        <h2>Channel × Altitude Matrix</h2>
        <p>How each altitude engages with each communication channel. The same channel serves different purposes at different altitudes — a dashboard is "portfolio view" at Executive but "team metrics" at Team level. The cells show role/purpose and cadence.</p>
      </div>
      <div style={{ overflowX: 'auto' }}>
        <table className="matrix-table">
          <thead>
            <tr>
              <th>Altitude</th>
              {channelHeaders.map(h => <th key={h}>{h}</th>)}
            </tr>
          </thead>
          <tbody>
            {ALTITUDES.map(alt => (
              <tr key={alt.id}>
                <td style={{ color: alt.color }}>{alt.name}</td>
                {channelHeaders.map(ch => {
                  const cell = matrixData[alt.id]?.[ch];
                  return (
                    <td key={ch}>
                      {cell && cell.p !== '—' ? (
                        <div className="matrix-cell">
                          <div className="primary">{cell.p}</div>
                          <div className="secondary">{cell.s}</div>
                        </div>
                      ) : (
                        <span style={{ color: 'var(--border-soft)' }}>—</span>
                      )}
                    </td>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function AtomBuilderView({ atomAltitude, setAtomAltitude, atomOS, setAtomOS, atomType, setAtomType, atomChannel, setAtomChannel, atomCadence, setAtomCadence, atomDomain, setAtomDomain }) {

  const selectedAlt = ALTITUDES.find(a => a.id === atomAltitude);
  const availableChannels = atomAltitude
    ? CHANNELS.filter(c => c.altitudes.includes(atomAltitude))
    : CHANNELS;

  const atomComplete = atomAltitude && atomOS && atomType && atomChannel;

  // Generate content guidance based on selections
  const getGuidance = () => {
    if (!atomComplete) return null;
    const alt = ALTITUDES.find(a => a.id === atomAltitude);
    const type = COMM_TYPES.find(t => t.id === atomType);
    return {
      framing: `At ${alt.name} altitude, frame this ${type.label.toLowerCase()} using ${alt.timeHorizon} time horizon language.`,
      question: alt.keyQuestion,
      tone: atomAltitude === 'executive' ? 'Outcomes and investment language. No implementation details.' :
            atomAltitude === 'strategic' ? 'Architecture and pattern language. Trade-offs and rationale.' :
            atomAltitude === 'product' ? 'Product and outcome language. Metrics and evidence.' :
            atomAltitude === 'operational' ? 'Execution and coordination language. Blockers and status.' :
            'Learning and growth language. Skills and confidence.'
    };
  };

  const guidance = getGuidance();

  return (
    <div>
      <div className="section-intro">
        <h2>Communication Atom Builder</h2>
        <p>Select dimensions to compose a communication atom. Each combination produces specific guidance for tone, content framing, and channel-appropriate abstraction level. This is the "design system" for organizational communication — every update, report, or conversation is built from these atoms.</p>
      </div>
      <div className="atom-container">
        <div className="atom-controls">
          <div className="control-group">
            <label>Altitude</label>
            <div className="pill-group">
              {ALTITUDES.map(a => (
                <button key={a.id} className={`pill ${atomAltitude === a.id ? 'selected' : ''}`}
                  style={atomAltitude === a.id ? { background: a.color, borderColor: a.color } : {}}
                  onClick={() => setAtomAltitude(atomAltitude === a.id ? null : a.id)}>{a.name}</button>
              ))}
            </div>
          </div>
          <div className="control-group">
            <label>Operating System</label>
            <div className="pill-group">
              <button className={`pill ${atomOS === 'enterprise' ? 'selected' : ''}`}
                style={atomOS === 'enterprise' ? { background: '#e74c3c', borderColor: '#e74c3c' } : {}}
                onClick={() => setAtomOS(atomOS === 'enterprise' ? null : 'enterprise')}>Enterprise</button>
              <button className={`pill ${atomOS === 'enablement' ? 'selected' : ''}`}
                style={atomOS === 'enablement' ? { background: '#3498db', borderColor: '#3498db' } : {}}
                onClick={() => setAtomOS(atomOS === 'enablement' ? null : 'enablement')}>Enablement</button>
              <button className={`pill ${atomOS === 'both' ? 'selected' : ''}`}
                style={atomOS === 'both' ? { background: '#9b59b6', borderColor: '#9b59b6' } : {}}
                onClick={() => setAtomOS(atomOS === 'both' ? null : 'both')}>Both</button>
            </div>
          </div>
          <div className="control-group">
            <label>Communication Type</label>
            <div className="pill-group">
              {COMM_TYPES.map(t => (
                <button key={t.id} className={`pill ${atomType === t.id ? 'selected' : ''}`}
                  style={atomType === t.id ? { background: t.color, borderColor: t.color } : {}}
                  onClick={() => setAtomType(atomType === t.id ? null : t.id)}>{t.label}</button>
              ))}
            </div>
          </div>
          <div className="control-group">
            <label>Channel {atomAltitude && <span style={{color: 'var(--accent)', fontWeight: 400}}>· filtered to altitude</span>}</label>
            <div className="pill-group">
              {availableChannels.map(c => (
                <button key={c.id} className={`pill ${atomChannel === c.id ? 'selected' : ''}`}
                  onClick={() => setAtomChannel(atomChannel === c.id ? null : c.id)}>{c.label}</button>
              ))}
            </div>
          </div>
          <div className="control-group">
            <label>Cadence</label>
            <div className="pill-group">
              {CADENCES.map(c => (
                <button key={c.id} className={`pill ${atomCadence === c.id ? 'selected' : ''}`}
                  onClick={() => setAtomCadence(atomCadence === c.id ? null : c.id)}>{c.label}</button>
              ))}
            </div>
          </div>
          <div className="control-group">
            <label>Domain (Subaru)</label>
            <div className="pill-group">
              {DOMAINS.map(d => (
                <button key={d.id} className={`pill ${atomDomain === d.id ? 'selected' : ''}`}
                  onClick={() => setAtomDomain(atomDomain === d.id ? null : d.id)}>{d.label}</button>
              ))}
            </div>
          </div>
        </div>

        <div className="atom-preview">
          {atomComplete ? (
            <div>
              <div className="atom-card" style={{ borderLeftColor: selectedAlt?.color || 'var(--accent)' }}>
                <div className="meta-row">
                  <span className="meta-badge" style={{ background: selectedAlt?.bgColor, color: selectedAlt?.color }}>{selectedAlt?.name}</span>
                  <span className="meta-badge" style={{ background: atomOS === 'enterprise' ? 'rgba(231,76,60,0.15)' : atomOS === 'enablement' ? 'rgba(52,152,219,0.15)' : 'rgba(155,89,182,0.15)', color: atomOS === 'enterprise' ? '#e74c3c' : atomOS === 'enablement' ? '#3498db' : '#9b59b6' }}>
                    {atomOS === 'enterprise' ? 'Enterprise OS' : atomOS === 'enablement' ? 'Enablement OS' : 'Both OS'}
                  </span>
                  <span className="meta-badge" style={{ background: `${COMM_TYPES.find(t => t.id === atomType)?.color}22`, color: COMM_TYPES.find(t => t.id === atomType)?.color }}>
                    {COMM_TYPES.find(t => t.id === atomType)?.label}
                  </span>
                  {atomChannel && (
                    <span className="meta-badge" style={{ background: 'rgba(255,255,255,0.06)', color: 'var(--text-primary)' }}>
                      {CHANNELS.find(c => c.id === atomChannel)?.label}
                    </span>
                  )}
                  {atomCadence && (
                    <span className="meta-badge" style={{ background: 'rgba(255,255,255,0.06)', color: 'var(--text-muted)' }}>
                      {CADENCES.find(c => c.id === atomCadence)?.label}
                    </span>
                  )}
                  {atomDomain && (
                    <span className="meta-badge" style={{ background: 'rgba(255,255,255,0.06)', color: 'var(--text-muted)' }}>
                      {DOMAINS.find(d => d.id === atomDomain)?.label}
                    </span>
                  )}
                </div>

                {guidance && (
                  <div>
                    <div className="content-block">
                      <h4>Content Framing</h4>
                      <p>{guidance.framing}</p>
                    </div>
                    <div className="content-block" style={{ marginTop: '12px' }}>
                      <h4>Key Question This Altitude Answers</h4>
                      <p style={{ fontStyle: 'italic', color: selectedAlt?.color }}>"{guidance.question}"</p>
                    </div>
                    <div className="content-block" style={{ marginTop: '12px' }}>
                      <h4>Tone & Language Guide</h4>
                      <p>{guidance.tone}</p>
                    </div>
                  </div>
                )}
              </div>

              <div style={{ padding: '16px', background: 'var(--surface2)', borderRadius: '8px' }}>
                <h4 style={{ fontSize: '13px', color: 'var(--accent)', marginBottom: '8px' }}>ACCOUNTABILITIES AT THIS ALTITUDE</h4>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px' }}>
                  {(atomOS === 'enterprise' || atomOS === 'both') && (
                    <div>
                      <div style={{ fontSize: '11px', color: '#e74c3c', marginBottom: '4px' }}>ENTERPRISE OS</div>
                      {selectedAlt?.enterprise.owns.map((o, i) => (
                        <span key={i} className="accountability-tag own">{o}</span>
                      ))}
                    </div>
                  )}
                  {(atomOS === 'enablement' || atomOS === 'both') && (
                    <div>
                      <div style={{ fontSize: '11px', color: '#3498db', marginBottom: '4px' }}>ENABLEMENT OS</div>
                      {selectedAlt?.enablement.owns.map((o, i) => (
                        <span key={i} className="accountability-tag own">{o}</span>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            </div>
          ) : (
            <div style={{ textAlign: 'center', padding: '60px 20px', color: 'var(--text-muted)' }}>
              <div style={{ fontSize: '48px', marginBottom: '16px', opacity: 0.3 }}>&#9670;</div>
              <p style={{ fontSize: '16px', marginBottom: '8px' }}>Select Altitude + OS + Type + Channel</p>
              <p style={{ fontSize: '13px' }}>to compose a communication atom with content guidance</p>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function SubaruView() {
  return (
    <div>
      <div className="section-intro">
        <h2>Subaru Engagement — Atomic Decomposition</h2>
        <p>Real scenarios from the M.A.R.S. engagement decomposed into their communication atoms. Each scenario shows the dimensional tags that define how content should be framed, who it serves, and what channel it travels through. Use these as templates for consistent "tagging" across the Turnberry team.</p>
      </div>
      {SUBARU_SCENARIOS.map((s, i) => (
        <div key={i} className="scenario-card">
          <h3>{s.title}</h3>
          <div className="scenario-desc">{s.desc}</div>
          <div className="scenario-atoms">
            {s.atoms.map((a, j) => (
              <div key={j} className="scenario-atom">
                <span className="dim-label">{a.dim}</span>
                <span className="dim-value" style={{ color: a.color }}>{a.value}</span>
              </div>
            ))}
          </div>
          <div style={{ marginTop: '12px', padding: '10px 14px', background: 'rgba(88,166,255,0.06)', borderRadius: '6px', borderLeft: '3px solid var(--accent)' }}>
            <div style={{ fontSize: '11px', color: 'var(--accent)', fontWeight: 600, marginBottom: '4px' }}>CONTENT GUIDANCE</div>
            <div style={{ fontSize: '13px', color: 'var(--text-muted)', lineHeight: 1.5 }}>{s.contentGuidance}</div>
          </div>
        </div>
      ))}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
